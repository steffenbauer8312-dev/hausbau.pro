<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52">
  <title>hausbau.pro</title>
  <desc>Logo hausbau.pro - Kostenlose Vermittlung von Dachdeckern</desc>

  <!-- Haus-Symbol: stylized roof + body -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M6 22 L24 6 L42 22" stroke="#1e40af" stroke-width="4" fill="none"/>
    <!-- House body -->
    <path d="M10 22 V40 H38 V22" stroke="#1e40af" stroke-width="4" fill="none"/>
    <!-- Door -->
    <rect x="20" y="30" width="8" height="10" fill="#1e40af" stroke="none" rx="1"/>
  </g>

  <!-- Text: hausbau -->
  <text x="54" y="35"
    font-family="Inter, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="800"
    fill="#1e293b"
    letter-spacing="-0.5">hausbau</text>

  <!-- Text: .pro -->
  <text x="194" y="35"
    font-family="Inter, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="800"
    fill="#f59e0b"
    letter-spacing="-0.5">.pro</text>
</svg>